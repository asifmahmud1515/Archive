<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: gap: content:; style-src * 'self' 'unsafe-inline'; script-src * 'self' 'unsafe-inline' 'unsafe-eval'; img-src * 'self' data: content:; connect-src * 'self'; font-src * 'self' data:; frame-src * 'self';" />
    <meta name="theme-color" content="#131313" />
    <title>The Archive</title>
    <style>
      :root {
        --background: #131313;
        --on-surface: #e5e2e1;
        --primary-fixed: #a93631;
      }
      html, body {
        background-color: #131313 !important;
        color: #e5e2e1 !important;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
        background-color: #131313;
      }
      /* Fallback for buttons if CSS fails */
      button {
        background-color: #a93631;
        color: white;
        border: none;
        padding: 10px 20px;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // APK Debugger
      window.onerror = function(msg, url, line, col, error) {
        console.error("APK_ERROR: " + msg + " at " + url + ":" + line);
        var debugDiv = document.createElement('div');
        debugDiv.style.position = 'fixed';
        debugDiv.style.top = '0';
        debugDiv.style.left = '0';
        debugDiv.style.background = 'red';
        debugDiv.style.color = 'white';
        debugDiv.style.zIndex = '10000';
        debugDiv.style.fontSize = '10px';
        debugDiv.style.padding = '5px';
        debugDiv.innerText = "CRITICAL_ERROR: " + msg;
        document.body.appendChild(debugDiv);
      };
      console.log("APK_LOAD_INIT: Environment check starting...");
      if (window.location.protocol === 'file:') {
        console.log("APK_LOAD_INIT: Running in local file environment.");
      }
    </script>
  </body>
</html>
